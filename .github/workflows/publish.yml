name: Publish to npm

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    # Maintainer-triggered: fires on `release: created`, which only repo
    # maintainers can do. `release` is a protected environment with required
    # reviewers (a maintainer + the builder-experience team), so a publish
    # needs an explicit human approval click before this job runs.
    environment: release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - run: npm ci

      # Full offline suite (test/test.js etc.) — builds internally
      # (npm test → npm run build → node --test). The public package ships with
      # NO Sentry DSN: telemetry is strictly opt-in and inert by default. Do NOT
      # add a SENTRY_DSN secret to this repo — leaving it unset is the design.
      - run: npm test

      # The package is published to the @parity scope through Parity's
      # `npm_publish_automation` — this repo never holds an npm token. We build
      # the tarball, upload it as an artifact, and dispatch to the automation,
      # which downloads the artifact (via its org token), re-checks the packed
      # name against its allowlist, and runs `npm publish` with the @parity
      # credentials. Same flow bulletin-deploy uses for @parity/product-deploy.
      - name: Determine npm dist-tag
        id: tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            echo "npm_tag=rc" >> "$GITHUB_OUTPUT"   # pre-release → @rc, @latest untouched
          else
            echo "npm_tag=" >> "$GITHUB_OUTPUT"      # stable → @latest
          fi

      # PCF publishes its build under @polkadot-community-foundation. Keep the
      # @parity/polkadot-app-deploy name in-tree (merge-clean with upstream) and rescope-at-pack:
      # the script stages a @polkadot-community-foundation/polkadot-app-deploy tarball into
      # pack-output/. Same pattern as browse-sdk + cdm-env.
      - name: Stage @polkadot-community-foundation/polkadot-app-deploy tarball (rescope-at-pack)
        run: node scripts/rescope-pack.mjs

      - uses: actions/upload-artifact@v7
        with:
          name: polkadot-app-deploy
          path: pack-output/*.tgz

      # Publish via PCF's own npm-publish-automation (holds the @polkadot-community-foundation
      # npm token), NOT paritytech's. Dispatch is inlined (public create-github-app-token + a
      # gh api call) rather than the automation's composite action, because sharing a PRIVATE
      # repo's actions cross-repo is plan-gated. npm_tag carries the rc/latest dist-tag.
      - name: Mint App token (dispatch scope)
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.PUBLISH_APP_ID }}
          private-key: ${{ secrets.PUBLISH_APP_PRIVATE_KEY }}
          owner: Polkadot-Community-Foundation
          repositories: npm-publish-automation

      - name: Dispatch PCF npm-publish-automation
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_TAG: ${{ steps.tag.outputs.npm_tag }}
        run: |
          set -euo pipefail
          printf '{"ref":"main","inputs":{"repo":"%s","run_id":"%s","artifact_name":"polkadot-app-deploy","npm_tag":"%s"}}' \
            "${{ github.repository }}" "${{ github.run_id }}" "$NPM_TAG" \
          | gh api -X POST \
              /repos/Polkadot-Community-Foundation/npm-publish-automation/actions/workflows/publish.yml/dispatches \
              --input -
